<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PendaQi Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>

    <div class="sidebar d-flex flex-column p-3">
        <div class="d-flex align-items-center mb-4 ps-2">
            <img src="../image/image.png" alt="Logo" width="40" class="me-2">
            <h3 class="mb-0 fw-bold">PendaQi</h3>
        </div>

        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="../html/admin.html" class="nav-link active">
                    <span class="material-icons">home</span> Beranda
                </a>
            </li>
            <li>
                <a href="../html/orders.html" class="nav-link">
                    <span class="material-icons">shopping_bag</span> Pesanan
                </a>
            </li>
            <li>
                <a href="../html/profile.html" class="nav-link">
                    <span class="material-icons">person</span> Profil
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">

        <div
            class="promo-banner p-4 p-md-5 mb-4 text-white d-flex justify-content-between align-items-center shadow-sm">
            <div>
                <h2 class="fw-bold">Promo Sewa Alat Pendakian</h2>
                <p class="lead">Diskon 20% untuk penyewaan pertama Anda!</p>
                <button class="btn btn-light btn-lg fw-bold text-success mt-2">Lihat Promo</button>
            </div>
            <img src="../image/tenda.jpg" alt="Promo" class="d-none d-md-block"
                style="width: 150px; filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.2));">
        </div>

        <div class="mb-4">
            <div class="input-group input-group-lg shadow-sm">
                <span class="input-group-text bg-white border-0"><span
                        class="material-icons text-muted">search</span></span>
                <input type="text" class="form-control border-0" placeholder="Cari perlengkapan naik gunung...">
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Katalog Produk</h4>
            <a href="../html/project.html">

                <button class="btn btn-outline-success btn-sm rounded-pill">Tampilkan Semua</button>
            </a>

        </div>

        <div class="row g-4">
            <div class="col-6 col-md-4 col-lg-3">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="../image/jaket.webp" class="card-img-top" alt="Jaket">
                    <div class="card-body text-center">
                        <h6 class="card-title fw-bold">Jaket Windbreaker</h6>
                        <a href="../html/produk.html">
                            <button class="btn btn-success w-100 mt-2">Detail</button>
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="../image/tenda.jpg" class="card-img-top" alt="Tenda">
                    <div class="card-body text-center">
                        <h6 class="card-title fw-bold">Tenda 4 Orang</h6>
                        <a href="../html/produk2.html">
                            <button class="btn btn-success w-100 mt-2">Detail</button>
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="../image/Sepatu1.jpg" class="card-img-top" alt="Sepatu">
                    <div class="card-body text-center">
                        <h6 class="card-title fw-bold">Sepatu Gunung</h6>
                        <a href="../html/produk3.html">
                            <button class="btn btn-success w-100 mt-2">Detail</button>
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="../image/Carrier.jpg" class="card-img-top" alt="Carrier">
                    <div class="card-body text-center">
                        <h6 class="card-title fw-bold">Carrier 60L</h6>
                        <a href="../html/produk4.html">
                            <button class="btn btn-success w-100 mt-2">Detail</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
