<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PoendaQi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="register-box p-5 shadow">
            <div class="text-center mb-4">
                <h2 class="fw-bold brand-color">Register</h2>
                <p class="text-muted">Buat akun baru PoendaQi</p>
            </div>

            <div class="mb-3">
                <input type="text" class="form-control custom-input" placeholder="Nama Lengkap">
            </div>
            <div class="mb-3">
                <input type="email" class="form-control custom-input" placeholder="Email">
            </div>
            <div class="mb-3">
                <input type="text" class="form-control custom-input" placeholder="No HP">
            </div>
            <div class="mb-4">
                <input type="password" class="form-control custom-input" placeholder="Password">
            </div>

            <div class="d-grid gap-2">
                <a href="../html/index.html" class="btn btn-register py-2 fw-bold text-decoration-none text-center">Register</a>
            </div>

            <div class="text-center mt-4">
                <p class="mb-0 small">Sudah punya akun? <a href="../html/index.html" class="brand-link fw-bold text-decoration-none">Login di sini</a></p>
            </div>
        </div>
    </div>

</body>
</html>
